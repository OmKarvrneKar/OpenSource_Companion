services:

  # ─────────────────────────────────────────
  # PostgreSQL — primary relational database
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: oc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: opensourcecompanion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — Celery broker + API cache
  # AOF persistence enabled
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oc_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - faiss_data:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Next.js frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oc_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # Celery Worker — processes background jobs
  # 4 concurrency slots, one task at a time each
  # Handles: process_new_issue, process_pr_merged
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oc_celery_worker
    restart: unless-stopped
    command: celery -A celery_worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - faiss_data:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Celery Beat — periodic task scheduler
  # IMPORTANT: Only one Beat instance allowed
  # Handles: check_contribution_status (6h)
  #          send_notifications (5min)
  #          retrain_classifier (30 days)
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oc_celery_beat
    restart: unless-stopped
    command: celery -A celery_beat beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat-schedule  # persists beat schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Flower — Celery monitoring dashboard
  # Visit: http://localhost:5555
  # See: task queue, worker status, retries
  # ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oc_flower
    restart: unless-stopped
    command: celery -A celery_worker flower --port=5555 --basic_auth=admin:admin
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker

# ─────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  faiss_data:
  celery_beat_data: