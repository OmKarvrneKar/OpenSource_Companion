# ── .github/workflows/deploy.yml ────────────────────────────────
# Deploys to Railway ONLY after tests pass
# Triggered by push to main
# ────────────────────────────────────────────────────────────────

name: Deploy to Railway

on:
  # Disabled — manual deployment only via Railway dashboard or explicit workflow dispatch
  # push:
  #   branches: [main]
  workflow_dispatch:  # Allow manual trigger from Actions tab

jobs:
  # ── Step 1: Run tests first ────────────────────────────────────
  # Inline test job so deploy can depend on it
  run-tests:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: opensourcecompanion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install and test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/opensourcecompanion_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key-for-ci
          GITHUB_WEBHOOK_SECRET: test-webhook-secret
          ENVIRONMENT: test
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
          alembic upgrade head
          pytest tests/ -v --tb=short

  # ── Step 2: Deploy ONLY if tests passed ───────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: run-tests          # ← FIX: blocks deploy until tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # ── FIX: correct Railway CLI v3 syntax ────────────────────
      # railway up deploys ALL services defined in railway.toml
      # Use --service flag to deploy one at a time with correct env
      - name: Deploy all services to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach

      - name: Print deployment URLs
        run: |
          echo "Deployment triggered on Railway."
          echo "Check status at: https://railway.app/dashboard"
